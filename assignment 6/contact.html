<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="contact-heading">Contact Me</h1>

  <p class="contact-me-text">If you’re interested in collaborating, commissioning work, <br>or starting a conversation around a project or idea, feel free to get in touch.</p>

  <form id="contactForm">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name">
    <div class="error" id="nameError"></div>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email">
    <div class="error" id="emailError"></div>

    <label for="message">Message:</label>
    <textarea id="message" name="message" rows="5"></textarea>
    <div class="error" id="messageError"></div>

    <button type="submit">Submit</button>
  </form>

  <img src="images/profile-picture.jpg" alt="Profile picture of Sisonke Segunda" class="profile-picture">

  <!-- Pop-up -->
  <div id="PopUp" class="PopUp">
    <div class="PopUp-content">
      <span class="close" id="closePopUp">&times;</span>
      <h2>Thank You for Submitting!</h2>
      <p id="PopUpDetails"></p>
      <p>I will get back to you shortly.</p>
    </div>
  </div>
<script src="script.js" defer></script>

</body>
</html>
